name: Install dependencies and deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download library files directly
        run: |
          mkdir -p lib
          curl -L "https://aframe.io/releases/1.3.0/aframe.min.js" -o lib/aframe.min.js
          curl -L "https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js" -o lib/aframe-ar-nft.js
          echo "Downloaded files:"
          ls -lh lib/

      - name: Commit lib/ files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/
          git diff --staged --quiet && echo "No changes" || (git commit -m "Auto: download correct lib files" && git push)
