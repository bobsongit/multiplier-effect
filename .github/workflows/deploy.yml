name: Install dependencies and deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and verify library files
        run: |
          mkdir -p lib

          # Download aframe via npm (guaranteed correct file)
          npm pack aframe@1.3.0
          tar -xzf aframe-1.3.0.tgz
          cp package/dist/aframe-v1.3.0.min.js lib/aframe2.min.js
          echo "aframe size: $(wc -c < lib/aframe2.min.js) bytes"

          # Download AR.js NFT via npm
          npm pack @ar-js-org/ar.js@3.4.5
          tar -xzf ar-js-org-ar.js-3.4.5.tgz
          cp package/aframe/build/aframe-ar-nft.js lib/aframe-ar-nft2.js
          echo "ar.js size: $(wc -c < lib/aframe-ar-nft2.js) bytes"

          ls -lh lib/

      - name: Commit lib/ files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/
          git diff --staged --quiet && echo "No changes" || (git commit -m "Auto: download correct lib files via npm pack" && git pull --rebase && git push)
