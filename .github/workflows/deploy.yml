name: Install dependencies and deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download library files
        run: |
          mkdir -p vendor

          # aframe 1.6.0 - version used in official AR.js examples
          npm pack aframe@1.6.0
          tar -xzf aframe-1.6.0.tgz
          cp package/dist/aframe-v1.6.0.min.js vendor/aframe.min.js
          rm -rf package aframe-1.6.0.tgz

          # AR.js NFT latest
          npm pack @ar-js-org/ar.js@3.4.5
          tar -xzf ar-js-org-ar.js-3.4.5.tgz
          cp package/aframe/build/aframe-ar-nft.js vendor/arjs-nft.js
          rm -rf package ar-js-org-ar.js-3.4.5.tgz

          echo "vendor/ contents:"
          ls -lh vendor/

      - name: Commit and push vendor/ files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vendor/
          git stash
          git pull --rebase origin main
          git stash pop
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "Auto: update vendor to aframe 1.6.0" && git push origin main)
