name: Install dependencies and deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm packages
        run: npm install

      - name: Find and copy library files to lib/
        run: |
          mkdir -p lib
          echo "--- aframe package contents ---"
          find node_modules/aframe -name "*.min.js" | head -20
          echo "--- ar.js package contents ---"
          find node_modules/@ar-js-org -name "*.js" | grep -i nft | head -20
          echo "--- copying ---"
          cp node_modules/aframe/dist/aframe-v1.3.0.min.js lib/aframe.min.js
          cp $(find node_modules/@ar-js-org -name "aframe-ar-nft.js" | head -1) lib/aframe-ar-nft.js
          echo "Files copied:"
          ls -lh lib/

      - name: Commit lib/ files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/
          git diff --staged --quiet && echo "No changes" || (git commit -m "Auto: add bundled lib files" && git push)
