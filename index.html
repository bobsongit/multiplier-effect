<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Green Port 2050 – WebAR Layers</title>

  <!-- A-Frame + AR.js NFT -->
  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      overflow: hidden;
      touch-action: none;
    }

    /* ── HUD overlay ── */
    #hud {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      padding: 16px 16px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    #status {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      pointer-events: none;
    }

    #buttons {
      display: flex;
      gap: 10px;
      pointer-events: all;
    }

    .layer-btn {
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: white;
      background: rgba(255,255,255,0.08);
      user-select: none;
    }

    .layer-btn.active {
      border-color: var(--col);
      background: color-mix(in srgb, var(--col) 30%, transparent);
      box-shadow: 0 0 16px color-mix(in srgb, var(--col) 50%, transparent);
      color: white;
    }

    #btn-green  { --col: #4ade80; }
    #btn-pink   { --col: #f472b6; }
    #btn-purple { --col: #c084fc; }

    /* ── Info panel (shown when tracking) ── */
    #info-panel {
      position: fixed;
      top: 20px; right: 16px;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      font-size: 12px;
      line-height: 1.6;
      min-width: 160px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #info-panel.visible { opacity: 1; }
    #info-panel .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 6px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    /* ── Scanning hint ── */
    #scan-hint {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 998;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    #scan-hint.hidden { opacity: 0; }
    .scan-ring {
      width: 180px; height: 180px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 24px;
      margin: 0 auto 16px;
      position: relative;
      animation: scanPulse 2s ease-in-out infinite;
    }
    .scan-ring::before, .scan-ring::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: white;
      border-style: solid;
    }
    .scan-ring::before { top: -3px; left: -3px; border-width: 3px 0 0 3px; border-radius: 8px 0 0 0; }
    .scan-ring::after  { bottom: -3px; right: -3px; border-width: 0 3px 3px 0; border-radius: 0 0 8px 0; }
    @keyframes scanPulse {
      0%,100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.04); opacity: 1; }
    }
    #scan-hint p {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ── Scanning hint ── -->
  <div id="scan-hint">
    <div class="scan-ring"></div>
    <p>Point at the poster</p>
  </div>

  <!-- ── Tracking indicator ── -->
  <div id="info-panel">
    <span class="dot"></span> Tracking poster<br>
    <span style="color:rgba(255,255,255,0.5); font-size:11px;">Tap layers to reveal</span>
  </div>

  <!-- ── Layer control buttons ── -->
  <div id="hud">
    <div id="status">Searching for poster…</div>
    <div id="buttons">
      <button class="layer-btn" id="btn-green"  onclick="toggleLayer('green')">🟢 Layer 1</button>
      <button class="layer-btn" id="btn-pink"   onclick="toggleLayer('pink')">🩷 Layer 2</button>
      <button class="layer-btn" id="btn-purple" onclick="toggleLayer('purple')">🟣 Layer 3</button>
    </div>
  </div>

  <!-- ── A-Frame Scene ── -->
  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium; alpha: true;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

    <!--
      IMAGE TRACKING via NFT.
      IMPORTANT: replace `url` with the path to your generated NFT descriptor files
      (without extension). The three files needed are:  poster.fset  poster.fset3  poster.iset
      Generate them at: https://carnaux.github.io/NFT-Marker-Creator/
      For now we use a Hiro fallback marker so you can test layer toggling immediately.
    -->

    <!-- NFT image tracking – targets assets/poster.fset / .fset3 / .iset -->
    <a-nft
      id="nft-target"
      type="nft"
      url="assets/poster"
      smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5"
      raycaster="objects: .clickable"
      emitevents="true">

      <!-- Base poster reference plane (invisible, just holds the coordinate space) -->
      <a-plane
        id="layer-base"
        src="Dia1.PNG"
        width="3.58" height="2"
        position="0 0 0.001"
        rotation="-90 0 0"
        material="transparent: true; opacity: 0.0; side: double;">
      </a-plane>

      <!-- Layer 1 – Green circles (Dia2) -->
      <a-plane
        id="layer-green"
        src="Dia2.PNG"
        width="3.58" height="2"
        position="0 0 0.01"
        rotation="-90 0 0"
        visible="false"
        material="transparent: true; alphaTest: 0.05; side: double; opacity: 1;">
      </a-plane>

      <!-- Layer 2 – Pink shapes (Dia3) -->
      <a-plane
        id="layer-pink"
        src="Dia3.PNG"
        width="3.58" height="2"
        position="0 0 0.02"
        rotation="-90 0 0"
        visible="false"
        material="transparent: true; alphaTest: 0.05; side: double; opacity: 1;">
      </a-plane>

      <!-- Layer 3 – Purple text (Dia4) -->
      <a-plane
        id="layer-purple"
        src="Dia4.PNG"
        width="3.58" height="2"
        position="0 0 0.03"
        rotation="-90 0 0"
        visible="false"
        material="transparent: true; alphaTest: 0.05; side: double; opacity: 1;">
      </a-plane>

    </a-nft>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // ── Layer state ──
    const layerMap = {
      green:  'layer-green',
      pink:   'layer-pink',
      purple: 'layer-purple',
    };
    const state = { green: false, pink: false, purple: false };

    function toggleLayer(name) {
      state[name] = !state[name];
      const el = document.getElementById(layerMap[name]);
      if (el) el.setAttribute('visible', state[name]);

      const btn = document.getElementById('btn-' + name);
      btn.classList.toggle('active', state[name]);
    }

    // ── NFT tracking feedback ──
    const marker    = document.getElementById('nft-target');
    const status    = document.getElementById('status');
    const hint      = document.getElementById('scan-hint');
    const infoPanel = document.getElementById('info-panel');

    marker.addEventListener('targetFound', () => {
      status.textContent = '✓ Poster detected – tap layers below';
      hint.classList.add('hidden');
      infoPanel.classList.add('visible');
    });

    marker.addEventListener('targetLost', () => {
      status.textContent = 'Searching for poster…';
      hint.classList.remove('hidden');
      infoPanel.classList.remove('visible');
    });

    // ── White-pixel removal via canvas texture post-processing ──
    // Because the PNGs have white (not transparent) backgrounds,
    // we rewrite each texture after load to punch out near-white pixels.
    AFRAME.registerComponent('remove-white', {
      schema: { threshold: { default: 230 } },
      init() {
        this.el.addEventListener('materialtextureloaded', () => {
          this.processTexture();
        });
      },
      processTexture() {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;
        const mat  = mesh.material;
        const tex  = mat && mat.map;
        if (!tex || !tex.image) return;

        const img = tex.image;
        const canvas = document.createElement('canvas');
        canvas.width  = img.naturalWidth  || img.width;
        canvas.height = img.naturalHeight || img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = imageData.data;
        const t = this.data.threshold;

        for (let i = 0; i < d.length; i += 4) {
          if (d[i] > t && d[i+1] > t && d[i+2] > t) {
            d[i+3] = 0; // fully transparent
          }
        }
        ctx.putImageData(imageData, 0, 0);

        const newTex = new THREE.CanvasTexture(canvas);
        mat.map = newTex;
        mat.needsUpdate = true;
      }
    });

    // Apply white-removal to all layer planes after scene loads
    document.querySelector('a-scene').addEventListener('loaded', () => {
      ['layer-green','layer-pink','layer-purple'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.setAttribute('remove-white', 'threshold: 235');
      });
    });
  </script>
</body>
</html>
