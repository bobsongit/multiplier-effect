<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebAR Test</title>
  <script src="vendor/aframe-160.min.js"></script>
  <script src="vendor/arjs-standard.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #hud {
      position: fixed; bottom: 20px; left: 0; right: 0;
      z-index: 999; display: flex; gap: 8px;
      justify-content: center; flex-wrap: wrap; padding: 0 12px;
    }
    .btn {
      padding: 12px 20px; border-radius: 30px; border: 2px solid white;
      background: rgba(0,0,0,0.5); color: white; font-size: 14px;
      font-weight: bold; cursor: pointer;
    }
    .btn.on { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-marker preset="hiro" id="marker" emitevents="true" smooth="true">
      <a-plane id="layer-green"  src="Dia2.PNG" width="3.58" height="2" position="0 0 0.01"  rotation="-90 0 0" visible="false" material="transparent:true; alphaTest:0.05; side:double;"></a-plane>
      <a-plane id="layer-pink"   src="Dia3.PNG" width="3.58" height="2" position="0 0 0.02"  rotation="-90 0 0" visible="false" material="transparent:true; alphaTest:0.05; side:double;"></a-plane>
      <a-plane id="layer-purple" src="Dia4.PNG" width="3.58" height="2" position="0 0 0.03"  rotation="-90 0 0" visible="false" material="transparent:true; alphaTest:0.05; side:double;"></a-plane>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <div id="hud">
    <button class="btn" onclick="toggle('green')">🟢 Layer 1</button>
    <button class="btn" onclick="toggle('pink')">🩷 Layer 2</button>
    <button class="btn" onclick="toggle('purple')">🟣 Layer 3</button>
  </div>

  <script>
    var layers = { green: false, pink: false, purple: false };

    function toggle(name) {
      layers[name] = !layers[name];
      document.getElementById('layer-' + name).setAttribute('visible', layers[name]);
      event.target.classList.toggle('on', layers[name]);
    }
  </script>
</body>
</html>
